const player = {
  x: 0, y: 0, z: 0,
  yaw: 0, pitch: 0,
  health: 100, maxHealth: 100,
  mana: 100, maxMana: 100,
  exp: 0, maxExp: 100,
  speed: 0.18, sprintSpeed: 0.35,
  isSprinting: false, isJumping: false,
  jumpForce: 0.18, gravity: 0.008,
  vy: 0,
  selectedSkill: 0,
  skills: [
    { name: '金箍棒', icon: '棒', cooldown: 0, maxCooldown: 400, damage: 35, manaCost: 0 },
    { name: '三昧真火', icon: '🔥', cooldown: 0, maxCooldown: 2500, damage: 90, manaCost: 25 },
    { name: '雷击', icon: '⚡', cooldown: 0, maxCooldown: 4000, damage: 140, manaCost: 45 },
    { name: '定身术', icon: '🌀', cooldown: 0, maxCooldown: 6000, damage: 0, manaCost: 35 },
    { name: '七十二变', icon: '🐒', cooldown: 0, maxCooldown: 12000, damage: 250, manaCost: 70 }
  ],
  transform: null,
  transformTimer: 0,
  level: 1
};

const keys = {};
let mouseDown = false;
let lastAttack = 0;
const WORLD_SIZE = 500;

let enemies = [];
let items = [];
let particles = [];

const levelData = {
  buildings: [],
  trees: [],
  clouds: []
};

function initLevel(levelNum) {
  const levelConfig = levels[levelNum - 1];
  if (!levelConfig) { gameWin(); return; }
  
  currentLevel = levelNum;
  levelKills = 0;
  levelTarget = levelConfig.enemies;
  bossDefeated = false;
  levelBoss = levelConfig.boss;
  
  document.getElementById('levelTitle').textContent = `第${levelNum}难`;
  document.getElementById('levelDesc').textContent = levelConfig.name;
  
  enemies.length = 0;
  items.length = 0;
  particles.length = 0;
  levelData.buildings.length = 0;
  levelData.trees.length = 0;
  levelData.clouds.length = 0;
  bloodStains = [];
  
  // 恐怖场景
  for (let i = 0; i < 35; i++) {
    levelData.buildings.push({
      x: (Math.random() - 0.5) * WORLD_SIZE,
      z: (Math.random() - 0.5) * WORLD_SIZE,
      w: 20 + Math.random() * 40,
      h: 30 + Math.random() * 50,
      color: `hsl(0, ${10 + Math.random() * 20}%, ${15 + Math.random() * 15}%)`,
      damaged: Math.random() > 0.5
    });
  }
  
  for (let i = 0; i < 100; i++) {
    levelData.trees.push({
      x: (Math.random() - 0.5) * WORLD_SIZE,
      z: (Math.random() - 0.5) * WORLD_SIZE,
      h: 15 + Math.random() * 25,
      r: 4 + Math.random() * 6,
      color: `hsl(0, ${20 + Math.random() * 30}%, ${20 + Math.random() * 15}%)`,
      dead: Math.random() > 0.4
    });
  }
  
  for (let i = 0; i < 15; i++) {
    levelData.clouds.push({
      x: (Math.random() - 0.5) * WORLD_SIZE * 2,
      y: 60 + Math.random() * 60,
      z: (Math.random() - 0.5) * WORLD_SIZE * 2,
      size: 30 + Math.random() * 50,
      speed: 0.005 + Math.random() * 0.01,
      dark: Math.random() > 0.3
    });
  }
  
  const demonCount = levelConfig.type === 'boss' ? levelConfig.enemies - 1 : levelConfig.enemies;
  for (let i = 0; i < demonCount; i++) spawnDemon(levelNum);
  if (levelConfig.type === 'boss' && levelConfig.boss) spawnBoss(levelConfig.boss, levelNum);
  for (let i = 0; i < 12; i++) spawnItem();
  
  updateProgress();
  
  if (levelConfig.type === 'boss') {
    document.getElementById('bossBar').style.display = 'block';
    document.getElementById('bossName').textContent = levelConfig.boss;
  } else {
    document.getElementById('bossBar').style.display = 'none';
  }
  
  // 恐怖文字提示
  setTimeout(() => showHorrorText(), 5000 + Math.random() * 10000);
}

function spawnDemon(levelNum) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 60 + Math.random() * 150;
  const difficulty = 1 + levelNum * 0.12;
  
  enemies.push({
    x: player.x + Math.cos(angle) * dist,
    y: 0,
    z: player.z + Math.sin(angle) * dist,
    health: (45 + Math.random() * 35) * difficulty,
    maxHealth: 80 * difficulty,
    speed: 0.03 + Math.random() * 0.05,
    damage: (10 + Math.random() * 15) * difficulty,
    type: 'demon',
    name: '厉鬼',
    lastAttack: 0,
    size: 8,
    color: `hsl(0, ${60 + Math.random() * 40}%, ${20 + Math.random() * 15}%)`,
    animation: Math.random() * Math.PI * 2,
    isBoss: false,
    teleportTimer: Math.random() * 5000
  });
}

function spawnBoss(name, levelNum) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 100 + Math.random() * 100;
  const difficulty = 1 + levelNum * 0.18;
  
  enemies.push({
    x: player.x + Math.cos(angle) * dist,
    y: 0,
    z: player.z + Math.sin(angle) * dist,
    health: (350 + levelNum * 60) * difficulty,
    maxHealth: (350 + levelNum * 60) * difficulty,
    speed: 0.04 + Math.random() * 0.04,
    damage: (30 + levelNum * 4) * difficulty,
    type: 'boss',
    name: name,
    lastAttack: 0,
    size: 22 + levelNum * 0.5,
    color: '#8b0000',
    animation: Math.random() * Math.PI * 2,
    isBoss: true,
    shieldGlow: 0,
    aura: 0
  });
}

function spawnItem() {
  const types = ['health', 'mana', 'exp'];
  const type = types[Math.floor(Math.random() * types.length)];
  items.push({
    x: (Math.random() - 0.5) * WORLD_SIZE * 0.7,
    y: 0,
    z: (Math.random() - 0.5) * WORLD_SIZE * 0.7,
    type: type,
    collected: false,
    glow: Math.random() * Math.PI * 2,
    float: Math.random() * Math.PI * 2
  });
}

function showHorrorText() {
  if (!gameRunning) return;
  const text = horrorTexts[Math.floor(Math.random() * horrorTexts.length)];
  const el = document.getElementById('horrorText');
  el.textContent = text;
  el.style.opacity = 1;
  setTimeout(() => { el.style.opacity = 0; }, 3000);
  setTimeout(() => showHorrorText(), 15000 + Math.random() * 20000);
}

function triggerBloodEffect() {
  bloodCtx.fillStyle = 'rgba(139, 0, 0, 0.3)';
  bloodCtx.fillRect(0, 0, bloodCanvas.width, bloodCanvas.height);
  
  for (let i = 0; i < 10; i++) {
    const x = Math.random() * bloodCanvas.width;
    const y = Math.random() * bloodCanvas.height;
    bloodCtx.fillStyle = `rgba(139, 0, 0, ${0.3 + Math.random() * 0.5})`;
    bloodCtx.beginPath();
    bloodCtx.arc(x, y, 10 + Math.random() * 30, 0, Math.PI * 2);
    bloodCtx.fill();
  }
  
  document.getElementById('bloodOverlay').style.opacity = 1;
  setTimeout(() => {
    document.getElementById('bloodOverlay').style.opacity = 0;
  }, 500);
}

function triggerScreenShake() {
  canvas.style.transform = `translate(${(Math.random() - 0.5) * 10}px, ${(Math.random() - 0.5) * 10}px)`;
  setTimeout(() => { canvas.style.transform = 'none'; }, 100);
}

function triggerFlicker() {
  flickerTimer = Date.now();
}

function update(deltaTime) {
  if (!gameRunning) return;
  
  const moveSpeed = player.isSprinting ? player.sprintSpeed : player.speed;
  let dx = 0, dz = 0;
  
  if (keys['w'] || keys['W']) { dx += Math.sin(player.yaw); dz += Math.cos(player.yaw); }
  if (keys['s'] || keys['S']) { dx -= Math.sin(player.yaw); dz -= Math.cos(player.yaw); }
  if (keys['a'] || keys['A']) { dx -= Math.cos(player.yaw); dz += Math.sin(player.yaw); }
  if (keys['d'] || keys['D']) { dx += Math.cos(player.yaw); dz -= Math.sin(player.yaw); }
  
  const len = Math.sqrt(dx * dx + dz * dz);
  if (len > 0) { dx = dx / len * moveSpeed; dz = dz / len * moveSpeed; }
  
  player.x += dx;
  player.z += dz;
  player.x = Math.max(-WORLD_SIZE/2, Math.min(WORLD_SIZE/2, player.x));
  player.z = Math.max(-WORLD_SIZE/2, Math.min(WORLD_SIZE/2, player.z));
  
  if (player.isJumping) {
    player.vy -= player.gravity;
    player.y += player.vy;
    if (player.y <= 0) { player.y = 0; player.vy = 0; player.isJumping = false; }
  }
  
  if (player.isSprinting && (dx !== 0 || dz !== 0)) {
    player.mana = Math.max(0, player.mana - 0.3);
  } else {
    player.mana = Math.min(player.maxMana, player.mana + 0.15);
  }
  
  player.isSprinting = (keys['Shift'] || keys['shift']) && player.mana > 15;
  if (keys[' '] && !player.isJumping) { player.isJumping = true; player.vy = player.jumpForce; }
  
  player.skills.forEach(skill => { if (skill.cooldown > 0) skill.cooldown -= deltaTime; });
  
  if (player.transform) {
    player.transformTimer -= deltaTime;
    if (player.transformTimer <= 0) { player.transform = null; showMessage('变身结束'); }
  }
  
  // 更新妖怪
  enemies.forEach(enemy => {
    const edx = player.x - enemy.x;
    const edz = player.z - enemy.z;
    const dist = Math.sqrt(edx * edx + edz * edz);
    
    enemy.animation += 0.05;
    if (enemy.isBoss) { enemy.shieldGlow += 0.05; enemy.aura += 0.03; }
    
    // 传送效果
    if (!enemy.isBoss) {
      enemy.teleportTimer -= deltaTime;
      if (enemy.teleportTimer <= 0) {
        const teleportDist = 20 + Math.random() * 30;
        const teleportAngle = Math.random() * Math.PI * 2;
        enemy.x = player.x + Math.cos(teleportAngle) * teleportDist;
        enemy.z = player.z + Math.sin(teleportAngle) * teleportDist;
        enemy.teleportTimer = 3000 + Math.random() * 5000;
        createParticles(enemy.x, enemy.y + 10, enemy.z, '#8b0000', 8);
      }
    }
    
    if (dist > 3) {
      enemy.x += (edx / dist) * enemy.speed;
      enemy.z += (edz / dist) * enemy.speed;
    } else {
      const now = Date.now();
      if (now - enemy.lastAttack > 1000) {
        const damage = player.transform ? enemy.damage * 0.5 : enemy.damage;
        player.health -= damage;
        enemy.lastAttack = now;
        showMessage(`-${damage.toFixed(0)} 生命`);
        createParticles(player.x, player.y + 10, player.z, '#dc2626', 12);
        triggerBloodEffect();
        triggerScreenShake();
      }
    }
    
    if (dist > 300) {
      const angle = Math.random() * Math.PI * 2;
      enemy.x = player.x + Math.cos(angle) * 150;
      enemy.z = player.z + Math.sin(angle) * 150;
    }
    
    if (enemy.isBoss && enemy === enemies.find(e => e.isBoss)) {
      document.getElementById('bossHealthFill').style.width = (enemy.health / enemy.maxHealth * 100) + '%';
    }
  });
  
  if (mouseDown && Date.now() - lastAttack > 300) { attack(); lastAttack = Date.now(); }
  
  items.forEach(item => {
    if (item.collected) return;
    const idx = player.x - item.x;
    const idz = player.z - item.z;
    const dist = Math.sqrt(idx * idx + idz * idz);
    item.glow += 0.04;
    item.float += 0.02;
    if (dist < 4 && keys['e']) { item.collected = true; collectItem(item); }
  });
  
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    p.vy -= 0.008; p.life -= 0.015; p.size *= 0.99;
  });
  
  levelData.clouds.forEach(c => { c.x += c.speed; if (c.x > WORLD_SIZE) c.x = -WORLD_SIZE; });
  
  // 恐怖效果
  horrorTimer += deltaTime;
  if (horrorTimer > 30000) {
    horrorTimer = 0;
    triggerFlicker();
  }
  
  player.health = Math.max(0, Math.min(player.maxHealth, player.health - 0.005));
  if (player.health <= 0) gameOver('被厉鬼吞噬...');
}

function attack() {
  const skill = player.skills[player.selectedSkill];
  if (skill.cooldown > 0) { showMessage('技能冷却中'); return; }
  if (player.mana < skill.manaCost) { showMessage('法力不足'); return; }
  
  player.mana -= skill.manaCost;
  skill.cooldown = skill.maxCooldown;
  
  const damageMultiplier = player.transform ? 2 : 1;
  
  if (skill.name === '金箍棒') {
    createParticles(player.x + Math.sin(player.yaw) * 8, player.y + 10, player.z + Math.cos(player.yaw) * 8, '#f59e0b', 12);
    enemies.forEach((enemy, i) => {
      const edx = enemy.x - player.x;
      const edz = enemy.z - player.z;
      const dist = Math.sqrt(edx * edx + edz * edz);
      if (dist < 15) {
        enemy.health -= skill.damage * damageMultiplier;
        createParticles(enemy.x, enemy.y + 10, enemy.z, '#dc2626', 15);
        if (enemy.health <= 0) killEnemy(i);
      }
    });
  } else if (skill.name === '三昧真火') {
    createParticles(player.x + Math.sin(player.yaw) * 10, player.y + 12, player.z + Math.cos(player.yaw) * 10, '#ff4500', 20);
    enemies.forEach((enemy, i) => {
      const edx = enemy.x - player.x;
      const edz = enemy.z - player.z;
      const dist = Math.sqrt(edx * edx + edz * edz);
      if (dist < 60) {
        enemy.health -= skill.damage * damageMultiplier;
        createParticles(enemy.x, enemy.y + 10, enemy.z, '#ff4500', 18);
        if (enemy.health <= 0) killEnemy(i);
      }
    });
  } else if (skill.name === '雷击') {
    for (let i = 0; i < 30; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * 70;
      createParticles(player.x + Math.cos(angle) * dist, player.y + 60, player.z + Math.sin(angle) * dist, '#ffff00', 3);
    }
    enemies.forEach((enemy, i) => {
      const edx = enemy.x - player.x;
      const edz = enemy.z - player.z;
      const dist = Math.sqrt(edx * edx + edz * edz);
      if (dist < 80) {
        enemy.health -= skill.damage * damageMultiplier;
        createParticles(enemy.x, enemy.y + 10, enemy.z, '#ffff00', 20);
        if (enemy.health <= 0) killEnemy(i);
      }
    });
  } else if (skill.name === '定身术') {
    createParticles(player.x, player.y + 10, player.z, '#7c3aed', 25);
    enemies.forEach(enemy => {
      const edx = enemy.x - player.x;
      const edz = enemy.z - player.z;
      const dist = Math.sqrt(edx * edx + edz * edz);
      if (dist < 50) {
        enemy.speed *= 0.1;
        setTimeout(() => { enemy.speed *= 10; }, 3000);
      }
    });
  } else if (skill.name === '七十二变') {
    player.transform = 'golden';
    player.transformTimer = 10000;
    showMessage('七十二变！');
    createParticles(player.x, player.y + 15, player.z, '#f59e0b', 40);
  }
}

function killEnemy(index) {
  const enemy = enemies[index];
  createExplosion(enemy.x, enemy.y + 10, enemy.z, '#dc2626');
  enemies.splice(index, 1);
  kills++;
  levelKills++;
  score += enemy.isBoss ? 500 : 100;
  player.exp += enemy.isBoss ? 100 : 25;
  checkLevelUp();
  showMessage(enemy.isBoss ? `击败${enemy.name}！` : '+100');
  updateProgress();
  
  if (enemy.isBoss) {
    bossDefeated = true;
    document.getElementById('bossBar').style.display = 'none';
    triggerBloodEffect();
  }
  
  if (levelKills >= levelTarget && (bossDefeated || !levelBoss)) levelComplete();
  spawnItem();
}

function collectItem(item) {
  if (item.type === 'health') { player.health = Math.min(player.maxHealth, player.health + 30); showMessage('+30 生命'); }
  else if (item.type === 'mana') { player.mana = Math.min(player.maxMana, player.mana + 40); showMessage('+40 法力'); }
  else if (item.type === 'exp') { player.exp += 50; checkLevelUp(); showMessage('+50 经验'); }
  score += 50;
  createParticles(item.x, item.y + 5, item.z, '#22c55e', 12);
}

function checkLevelUp() {
  if (player.exp >= player.maxExp) {
    player.exp -= player.maxExp;
    player.maxExp = Math.floor(player.maxExp * 1.5);
    player.level++;
    player.maxHealth += 15;
    player.maxMana += 10;
    player.health = player.maxHealth;
    player.mana = player.maxMana;
    showMessage(`升级！等级 ${player.level}`);
  }
}

function updateProgress() {
  const percent = (levelKills / levelTarget * 100).toFixed(0);
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressText').textContent = `消灭妖怪: ${levelKills}/${levelTarget}`;
}

function levelComplete() {
  gameRunning = false;
  const levelConfig = levels[currentLevel - 1];
  document.getElementById('completeTitle').textContent = `第${currentLevel}难 通过！`;
  document.getElementById('rewardsText').innerHTML = `
    ${levelConfig.name}<br>
    经验 +${100 + currentLevel * 20}<br>
    评分 +${1000 + currentLevel * 100}
  `;
  document.getElementById('levelComplete').style.display = 'flex';
  player.exp += 100 + currentLevel * 20;
  score += 1000 + currentLevel * 100;
  checkLevelUp();
}

function nextLevel() {
  document.getElementById('levelComplete').style.display = 'none';
  if (currentLevel >= 81) { gameWin(); } 
  else {
    initLevel(currentLevel + 1);
    player.x = 0; player.z = 0;
    gameRunning = true;
    gameLoop();
  }
}

function gameWin() {
  gameRunning = false;
  document.getElementById('gameOver').style.display = 'flex';
  document.getElementById('gameOver').querySelector('h1').textContent = '取经成功！';
  document.getElementById('deathStats').innerHTML = `
    恭喜完成九九八十一难！<br>
    等级：${player.level}<br>
    击杀妖怪：${kills}<br>
    最终评分：${score}
  `;
  document.body.style.cursor = 'default';
}

function gameOver(reason) {
  gameRunning = false;
  document.getElementById('gameOver').style.display = 'flex';
  document.getElementById('deathStats').innerHTML = `
    ${reason}<br>
    停在第${currentLevel}难<br>
    等级：${player.level}<br>
    击杀：${kills}<br>
    评分：${score}
  `;
  document.body.style.cursor = 'default';
}

function createParticles(x, y, z, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, z,
      vx: (Math.random() - 0.5) * 0.6,
      vy: Math.random() * 0.4,
      vz: (Math.random() - 0.5) * 0.6,
      color, life: 1, size: 3 + Math.random() * 4
    });
  }
}

function createExplosion(x, y, z, color) {
  for (let i = 0; i < 25; i++) {
    particles.push({
      x, y, z,
      vx: (Math.random() - 0.5) * 1.2,
      vy: Math.random() * 0.6,
      vz: (Math.random() - 0.5) * 1.2,
      color, life: 1, size: 4 + Math.random() * 5
    });
  }
}

function showMessage(text) {
  const msg = document.getElementById('message');
  msg.textContent = text;
  msg.style.opacity = 1;
  setTimeout(() => msg.style.opacity = 0, 1500);
}

function render() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  
  // 恐怖闪烁效果
  const now = Date.now();
  if (now - flickerTimer < 200) {
    ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.5})`;
    ctx.fillRect(0, 0, W, H);
    return;
  }
  
  // 暗黑天空
  const skyGradient = ctx.createLinearGradient(0, 0, 0, H * 0.6);
  skyGradient.addColorStop(0, '#050005');
  skyGradient.addColorStop(0.5, '#0a000a');
  skyGradient.addColorStop(1, '#150015');
  ctx.fillStyle = skyGradient;
  ctx.fillRect(0, 0, W, H);
  
  // 血色星星
  ctx.fillStyle = '#8b0000';
  for (let i = 0; i < 100; i++) {
    const sx = (Math.sin(i * 132.1) * 0.5 + 0.5) * W;
    const sy = (Math.cos(i * 73.7) * 0.5 + 0.5) * H * 0.4;
    ctx.globalAlpha = 0.2 + Math.sin(now / 3000 + i) * 0.2;
    ctx.beginPath();
    ctx.arc(sx, sy, 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // 血月
  ctx.fillStyle = '#8b0000';
  ctx.shadowColor = '#8b0000';
  ctx.shadowBlur = 50;
  ctx.beginPath();
  ctx.arc(W * 0.8, H * 0.1, 45, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // 地面
  const groundGradient = ctx.createLinearGradient(0, H * 0.6, 0, H);
  groundGradient.addColorStop(0, '#1a0a0a');
  groundGradient.addColorStop(1, '#050005');
  ctx.fillStyle = groundGradient;
  ctx.fillRect(0, H * 0.6, W, H * 0.4);
  
  // 血迹
  bloodStains.forEach(b => {
    ctx.globalAlpha = b.life;
    ctx.fillStyle = '#8b0000';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
  
  // 云朵
  levelData.clouds.forEach(c => {
    const relX = c.x - player.x;
    const relZ = c.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    if (rotZ > 0 && rotZ < 250) {
      const scale = 200 / rotZ;
      const screenX = W / 2 + rotX * scale;
      const screenY = H * 0.6 - c.y * scale;
      ctx.globalAlpha = c.dark ? 0.6 : 0.3;
      ctx.fillStyle = c.dark ? '#1a0a0a' : '#2a1a1a';
      ctx.beginPath();
      ctx.arc(screenX, screenY, c.size * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  });
  
  const objects3D = [];
  
  levelData.buildings.forEach(b => {
    const relX = b.x - player.x;
    const relZ = b.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    if (rotZ > 0.1 && rotZ < 250) {
      const scale = 200 / rotZ;
      objects3D.push({
        type: 'building',
        x: W / 2 + rotX * scale,
        y: H * 0.6 - b.h * scale / 2,
        w: b.w * scale,
        h: b.h * scale,
        d: rotZ,
        color: b.color,
        damaged: b.damaged
      });
    }
  });
  
  levelData.trees.forEach(t => {
    const relX = t.x - player.x;
    const relZ = t.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    if (rotZ > 0.1 && rotZ < 200) {
      const scale = 200 / rotZ;
      objects3D.push({
        type: 'tree',
        x: W / 2 + rotX * scale,
        y: H * 0.6,
        h: t.h * scale,
        r: t.r * scale,
        d: rotZ,
        color: t.color,
        dead: t.dead
      });
    }
  });
  
  enemies.forEach(e => {
    const relX = e.x - player.x;
    const relZ = e.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    if (rotZ > 0.1 && rotZ < 250) {
      const scale = 200 / rotZ;
      objects3D.push({
        type: 'enemy',
        x: W / 2 + rotX * scale,
        y: H * 0.6 - 10 * scale,
        size: e.size * scale,
        d: rotZ,
        health: e.health,
        maxHealth: e.maxHealth,
        name: e.name,
        color: e.color,
        animation: e.animation,
        isBoss: e.isBoss,
        shieldGlow: e.shieldGlow,
        aura: e.aura
      });
    }
  });
  
  items.forEach(item => {
    if (item.collected) return;
    const relX = item.x - player.x;
    const relZ = item.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    if (rotZ > 0.1 && rotZ < 200) {
      const scale = 200 / rotZ;
      objects3D.push({
        type: 'item',
        x: W / 2 + rotX * scale,
        y: H * 0.6 - 3 * scale + Math.sin(item.float) * 5,
        size: 3 * scale,
        d: rotZ,
        itemType: item.type,
        glow: item.glow
      });
    }
  });
  
  particles.forEach(p => {
    const relX = p.x - player.x;
    const relZ = p.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    if (rotZ > 0.1) {
      const scale = 200 / rotZ;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(W / 2 + rotX * scale, H * 0.6 - p.y * scale, p.size * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  });
  
  objects3D.sort((a, b) => b.d - a.d);
  
  objects3D.forEach(obj => {
    if (obj.type === 'building') {
      ctx.fillStyle = obj.color;
      ctx.fillRect(obj.x - obj.w/2, obj.y, obj.w, obj.h);
      if (obj.damaged) {
        ctx.strokeStyle = '#8b0000';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(obj.x - obj.w/4, obj.y);
        ctx.lineTo(obj.x + obj.w/4, obj.y + obj.h);
        ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(139,0,0,0.3)';
      ctx.lineWidth = 2;
      ctx.strokeRect(obj.x - obj.w/2, obj.y, obj.w, obj.h);
    } else if (obj.type === 'tree') {
      ctx.fillStyle = '#3a1a1a';
      ctx.fillRect(obj.x - 3, obj.y - obj.h * 0.4, 6, obj.h * 0.4);
      if (obj.dead) {
        ctx.strokeStyle = obj.color;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(obj.x, obj.y - obj.h * 0.4);
        ctx.lineTo(obj.x - obj.r, obj.y - obj.h * 0.7);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(obj.x, obj.y - obj.h * 0.3);
        ctx.lineTo(obj.x + obj.r * 0.8, obj.y - obj.h * 0.6);
        ctx.stroke();
      } else {
        ctx.fillStyle = obj.color;
        ctx.beginPath();
        ctx.arc(obj.x, obj.y - obj.h * 0.6, obj.r, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (obj.type === 'enemy') {
      const bodyWidth = obj.size * 0.8;
      const bodyHeight = obj.size * 1.2;
      const wobble = Math.sin(obj.animation) * 4;
      
      if (obj.isBoss) {
        ctx.globalAlpha = 0.4;
        const auraGradient = ctx.createRadialGradient(obj.x, obj.y - bodyHeight/2, 0, obj.x, obj.y - bodyHeight/2, obj.size * 2);
        auraGradient.addColorStop(0, 'rgba(139,0,0,0.5)');
        auraGradient.addColorStop(1, 'rgba(139,0,0,0)');
        ctx.fillStyle = auraGradient;
        ctx.beginPath();
        ctx.arc(obj.x, obj.y - bodyHeight/2, obj.size * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      
      ctx.fillStyle = obj.color;
      ctx.fillRect(obj.x - bodyWidth/2 + wobble, obj.y - bodyHeight, bodyWidth, bodyHeight);
      ctx.beginPath();
      ctx.arc(obj.x + wobble, obj.y - bodyHeight - obj.size * 0.3, obj.size * 0.35, 0, Math.PI * 2);
      ctx.fill();
      
      // 恐怖眼睛
      ctx.fillStyle = '#ff0000';
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(obj.x - obj.size * 0.15 + wobble, obj.y - bodyHeight - obj.size * 0.35, obj.size * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(obj.x + obj.size * 0.15 + wobble, obj.y - bodyHeight - obj.size * 0.35, obj.size * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(obj.x - obj.size/2, obj.y - obj.size - 14, obj.size, 8);
      const healthPercent = obj.health / obj.maxHealth;
      ctx.fillStyle = '#8b0000';
      ctx.fillRect(obj.x - obj.size/2, obj.y - obj.size - 14, healthPercent * obj.size, 8);
      
      ctx.fillStyle = obj.isBoss ? '#ff0000' : '#8b0000';
      ctx.font = `${Math.max(10, obj.size * 0.3)}px STKaiti, KaiTi, serif`;
      ctx.textAlign = 'center';
      ctx.fillText(obj.name, obj.x + wobble, obj.y - obj.size - 18);
    } else if (obj.type === 'item') {
      const pulse = Math.sin(obj.glow) * 0.2 + 1;
      const itemColors = { health: '#8b0000', mana: '#4a0080', exp: '#8b6914' };
      const itemIcons = { health: '❤️', mana: '💧', exp: '⭐' };
      
      ctx.fillStyle = itemColors[obj.itemType];
      ctx.shadowColor = itemColors[obj.itemType];
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(obj.x, obj.y, obj.size * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      ctx.fillStyle = '#fff';
      ctx.font = `${obj.size * 1.5}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(itemIcons[obj.itemType], obj.x, obj.y);
    }
  });
  
  // 恐怖暗角
  const vignette = ctx.createRadialGradient(W/2, H/2, W * 0.3, W/2, H/2, W * 0.7);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(0.5, 'rgba(0,0,0,0.3)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.7)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
  
  // 低血量恐怖效果
  if (player.health < 30) {
    ctx.fillStyle = `rgba(139,0,0,${0.1 + Math.sin(now / 500) * 0.05})`;
    ctx.fillRect(0, 0, W, H);
  }
  
  updateUI();
}

function updateUI() {
  document.getElementById('healthBar').style.width = (player.health / player.maxHealth * 100) + '%';
  document.getElementById('healthText').textContent = Math.round(player.health);
  document.getElementById('manaBar').style.width = (player.mana / player.maxMana * 100) + '%';
  document.getElementById('manaText').textContent = Math.round(player.mana);
  document.getElementById('expBar').style.width = (player.exp / player.maxExp * 100) + '%';
  document.getElementById('expText').textContent = `${player.exp}/${player.maxExp}`;
  
  document.querySelectorAll('.skill-slot').forEach((slot, i) => {
    slot.className = 'skill-slot' + (i === player.selectedSkill ? ' active' : '');
  });
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  gameRunning = true;
  score = 0; kills = 0;
  player.x = 0; player.y = 0; player.z = 0;
  player.health = 100; player.mana = 100; player.exp = 0;
  player.level = 1; player.transform = null;
  document.body.style.cursor = 'none';
  initLevel(1);
  gameLoop();
}

function restartGame() {
  document.getElementById('gameOver').style.display = 'none';
  document.getElementById('levelComplete').style.display = 'none';
  startGame();
}

let lastTime = 0;
function gameLoop(timestamp = 0) {
  if (!gameRunning) return;
  const deltaTime = timestamp - lastTime;
  lastTime = timestamp;
  update(deltaTime);
  render();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  const num = parseInt(e.key);
  if (num >= 1 && num <= 5) player.selectedSkill = num - 1;
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
document.addEventListener('mousemove', e => {
  if (!gameRunning) return;
  player.yaw += e.movementX * 0.002;
  player.pitch -= e.movementY * 0.002;
  player.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, player.pitch));
});
document.addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
document.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });
canvas.addEventListener('click', () => { if (gameRunning) canvas.requestPointerLock(); });
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth * PIXEL_RATIO;
  canvas.height = window.innerHeight * PIXEL_RATIO;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(PIXEL_RATIO, PIXEL_RATIO);
});
</script>
</body>
</html>
