<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西游记：大闹天宫 - 3A游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; cursor: none; }
canvas { display: block; }
#gameUI {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}
.ui-element { pointer-events: auto; }
#hud {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #fff;
  font-size: 14px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
.hud-item {
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.hud-bar {
  width: 150px;
  height: 12px;
  background: rgba(0,0,0,0.5);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.2);
}
.hud-bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.3s;
}
.health-fill { background: linear-gradient(90deg, #ef4444, #dc2626); }
.mana-fill { background: linear-gradient(90deg, #3b82f6, #2563eb); }
.exp-fill { background: linear-gradient(90deg, #f59e0b, #d97706); }
#deathTimer {
  position: fixed;
  top: 20px;
  right: 20px;
  color: #f59e0b;
  font-size: 48px;
  font-weight: 800;
  text-shadow: 0 0 20px rgba(245,158,11,0.8);
  font-family: 'Courier New', monospace;
}
#deathTimer.warning { animation: pulse 1s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.05); }
}
#minimap {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 180px;
  height: 180px;
  background: rgba(0,0,0,0.7);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 8px;
}
#inventory {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
}
.inv-slot {
  width: 50px;
  height: 50px;
  background: rgba(0,0,0,0.7);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s;
}
.inv-slot:hover { border-color: #f59e0b; background: rgba(245,158,11,0.2); }
.inv-slot.active { border-color: #ef4444; background: rgba(239,68,68,0.3); }
#crosshair {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 50%;
  pointer-events: none;
}
#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.5);
}
#crosshair::before {
  width: 2px;
  height: 8px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
#crosshair::after {
  width: 8px;
  height: 2px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
#startScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #1a0a0a, #2d1b1b);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  cursor: default;
}
#startScreen h1 {
  font-size: 72px;
  color: #f59e0b;
  text-shadow: 0 0 40px rgba(245,158,11,0.5);
  margin-bottom: 10px;
  font-family: 'STKaiti', 'KaiTi', serif;
  letter-spacing: 8px;
}
#startScreen h2 {
  font-size: 28px;
  color: #d97706;
  margin-bottom: 40px;
  font-weight: 300;
  font-family: 'STKaiti', 'KaiTi', serif;
}
#startBtn {
  padding: 16px 48px;
  font-size: 20px;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  letter-spacing: 4px;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(245,158,11,0.4);
}
#startBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(245,158,11,0.6);
}
.controls-info {
  margin-top: 40px;
  color: #94a3b8;
  font-size: 14px;
  text-align: center;
  line-height: 2;
}
.controls-info span {
  background: rgba(255,255,255,0.1);
  padding: 4px 12px;
  border-radius: 4px;
  margin: 0 4px;
}
#gameOver {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  cursor: default;
}
#gameOver h1 {
  font-size: 72px;
  color: #ef4444;
  margin-bottom: 20px;
  font-family: 'STKaiti', 'KaiTi', serif;
}
#gameOver .stats {
  color: #94a3b8;
  font-size: 18px;
  margin-bottom: 30px;
  text-align: center;
  line-height: 2;
}
#restartBtn {
  padding: 16px 48px;
  font-size: 20px;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}
#message {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-size: 24px;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
#skillBar {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
}
.skill-slot {
  width: 60px;
  height: 60px;
  background: rgba(0,0,0,0.7);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}
.skill-slot:hover { border-color: #f59e0b; }
.skill-slot.active { border-color: #ef4444; background: rgba(239,68,68,0.3); }
.skill-slot .skill-icon { font-size: 24px; }
.skill-slot .skill-key { font-size: 10px; color: #94a3b8; }
.skill-slot .skill-cd { font-size: 10px; color: #ef4444; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="gameUI">
  <div id="hud">
    <div class="hud-item">
      <span>❤️ 生命</span>
      <div class="hud-bar"><div class="hud-bar-fill health-fill" id="healthBar" style="width:100%"></div></div>
      <span id="healthText">100</span>
    </div>
    <div class="hud-item">
      <span>💧 法力</span>
      <div class="hud-bar"><div class="hud-bar-fill mana-fill" id="manaBar" style="width:100%"></div></div>
      <span id="manaText">100</span>
    </div>
    <div class="hud-item">
      <span>⭐ 经验</span>
      <div class="hud-bar"><div class="hud-bar-fill exp-fill" id="expBar" style="width:0%"></div></div>
      <span id="expText">0</span>
    </div>
  </div>
  
  <div id="deathTimer">取经倒计时</div>
  
  <canvas id="minimap"></canvas>
  
  <div id="skillBar">
    <div class="skill-slot active" data-skill="0">
      <span class="skill-icon">棒</span>
      <span class="skill-key">1</span>
    </div>
    <div class="skill-slot" data-skill="1">
      <span class="skill-icon">🔥</span>
      <span class="skill-key">2</span>
    </div>
    <div class="skill-slot" data-skill="2">
      <span class="skill-icon">⚡</span>
      <span class="skill-key">3</span>
    </div>
    <div class="skill-slot" data-skill="3">
      <span class="skill-icon">🌀</span>
      <span class="skill-key">4</span>
    </div>
    <div class="skill-slot" data-skill="4">
      <span class="skill-icon">🐒</span>
      <span class="skill-key">5</span>
    </div>
  </div>
  
  <div id="inventory">
    <div class="inv-slot active" data-slot="0">🪄</div>
    <div class="inv-slot" data-slot="1">🍑</div>
    <div class="inv-slot" data-slot="2">🍶</div>
    <div class="inv-slot" data-slot="3">📿</div>
    <div class="inv-slot" data-slot="4">🎁</div>
  </div>
  
  <div id="crosshair"></div>
  <div id="message"></div>
</div>

<div id="startScreen">
  <h1>西游记</h1>
  <h2>大闹天宫</h2>
  <button id="startBtn" onclick="startGame()">开始取经</button>
  <div class="controls-info">
    <span>WASD</span> 移动 | <span>鼠标</span> 视角 | <span>左键</span> 攻击<br>
    <span>1-5</span> 技能 | <span>E</span> 拾取 | <span>Space</span> 跳跃<br>
    <span>Shift</span> 筋斗云 | <span>R</span> 七十二变
  </div>
</div>

<div id="gameOver">
  <h1>取经失败</h1>
  <div class="stats" id="deathStats"></div>
  <button id="restartBtn" onclick="restartGame()">重新开始</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');

const PIXEL_RATIO = window.devicePixelRatio || 1;
canvas.width = window.innerWidth * PIXEL_RATIO;
canvas.height = window.innerHeight * PIXEL_RATIO;
canvas.style.width = window.innerWidth + 'px';
canvas.style.height = window.innerHeight + 'px';
ctx.scale(PIXEL_RATIO, PIXEL_RATIO);

minimapCanvas.width = 180;
minimapCanvas.height = 180;

let gameRunning = false;
let gameTime = 7200;
let score = 0;
let kills = 0;
let level = 1;

const player = {
  x: 0,
  y: 0,
  z: 0,
  vx: 0,
  vy: 0,
  vz: 0,
  yaw: 0,
  pitch: 0,
  health: 100,
  maxHealth: 100,
  mana: 100,
  maxMana: 100,
  exp: 0,
  maxExp: 100,
  speed: 0.18,
  sprintSpeed: 0.35,
  isSprinting: false,
  isJumping: false,
  jumpForce: 0.18,
  gravity: 0.008,
  selectedSkill: 0,
  skills: [
    {name: '金箍棒', icon: '棒', cooldown: 0, maxCooldown: 500, damage: 30, manaCost: 0},
    {name: '三昧真火', icon: '🔥', cooldown: 0, maxCooldown: 3000, damage: 80, manaCost: 30},
    {name: '雷击', icon: '⚡', cooldown: 0, maxCooldown: 5000, damage: 120, manaCost: 50},
    {name: '定身术', icon: '🌀', cooldown: 0, maxCooldown: 8000, damage: 0, manaCost: 40},
    {name: '七十二变', icon: '🐒', cooldown: 0, maxCooldown: 15000, damage: 200, manaCost: 80}
  ],
  inventory: [
    {name: '金箍棒', icon: '🪄'},
    {name: '蟠桃', icon: '🍑', count: 5},
    {name: '仙酒', icon: '🍶', count: 3},
    {name: '佛珠', icon: '📿', count: 1},
    {name: '宝箱', icon: '🎁', count: 2}
  ],
  transform: null,
  transformTimer: 0
};

const keys = {};
let mouseDown = false;
let lastShot = 0;

const WORLD_SIZE = 600;

const demons = [];
const items = [];
const particles = [];
const buildings = [];
const trees = [];
const clouds = [];
const mountains = [];

function initWorld() {
  buildings.length = 0;
  trees.length = 0;
  demons.length = 0;
  items.length = 0;
  clouds.length = 0;
  mountains.length = 0;
  
  // 天宫建筑
  for (let i = 0; i < 40; i++) {
    const type = Math.random();
    let building;
    if (type < 0.3) {
      // 天宫宫殿
      building = {
        x: (Math.random() - 0.5) * WORLD_SIZE,
        z: (Math.random() - 0.5) * WORLD_SIZE,
        w: 30 + Math.random() * 50,
        h: 40 + Math.random() * 60,
        d: 30 + Math.random() * 50,
        color: `hsl(${30 + Math.random() * 20}, ${60 + Math.random() * 20}%, ${50 + Math.random() * 20}%)`,
        type: 'palace',
        hasRoof: true,
        roofColor: '#dc2626',
        pillars: Math.floor(Math.random() * 4) + 2
      };
    } else if (type < 0.6) {
      // 蟠桃园
      building = {
        x: (Math.random() - 0.5) * WORLD_SIZE,
        z: (Math.random() - 0.5) * WORLD_SIZE,
        w: 20 + Math.random() * 30,
        h: 15 + Math.random() * 25,
        d: 20 + Math.random() * 30,
        color: '#8b4513',
        type: 'garden',
        hasTree: true,
        treeCount: Math.floor(Math.random() * 5) + 3
      };
    } else {
      // 练丹炉
      building = {
        x: (Math.random() - 0.5) * WORLD_SIZE,
        z: (Math.random() - 0.5) * WORLD_SIZE,
        w: 15 + Math.random() * 20,
        h: 20 + Math.random() * 30,
        d: 15 + Math.random() * 20,
        color: '#666',
        type: 'furnace',
        hasFire: true,
        fireIntensity: Math.random()
      };
    }
    buildings.push(building);
  }
  
  // 仙树
  for (let i = 0; i < 150; i++) {
    trees.push({
      x: (Math.random() - 0.5) * WORLD_SIZE,
      z: (Math.random() - 0.5) * WORLD_SIZE,
      h: 20 + Math.random() * 30,
      r: 5 + Math.random() * 8,
      type: Math.random() > 0.7 ? 'peach' : 'normal',
      color: `hsl(${120 + Math.random() * 40}, ${60 + Math.random() * 30}%, ${35 + Math.random() * 20}%)`,
      hasFruit: Math.random() > 0.5,
      glow: Math.random() * Math.PI * 2
    });
  }
  
  // 云朵
  for (let i = 0; i < 30; i++) {
    clouds.push({
      x: (Math.random() - 0.5) * WORLD_SIZE * 2,
      y: 80 + Math.random() * 100,
      z: (Math.random() - 0.5) * WORLD_SIZE * 2,
      size: 30 + Math.random() * 50,
      speed: 0.01 + Math.random() * 0.02,
      opacity: 0.3 + Math.random() * 0.4
    });
  }
  
  // 远山
  for (let i = 0; i < 8; i++) {
    mountains.push({
      x: (Math.random() - 0.5) * WORLD_SIZE * 3,
      z: (Math.random() - 0.5) * WORLD_SIZE * 3,
      h: 100 + Math.random() * 200,
      w: 80 + Math.random() * 120,
      color: `hsl(${200 + Math.random() * 30}, ${20 + Math.random() * 10}%, ${30 + Math.random() * 15}%)`
    });
  }
  
  // 妖怪
  for (let i = 0; i < 30; i++) {
    spawnDemon();
  }
  
  // 物品
  for (let i = 0; i < 40; i++) {
    spawnItem();
  }
}

function spawnDemon() {
  const angle = Math.random() * Math.PI * 2;
  const dist = 80 + Math.random() * 200;
  const type = Math.random();
  let demon;
  
  if (type < 0.4) {
    // 小妖
    demon = {
      x: player.x + Math.cos(angle) * dist,
      y: 0,
      z: player.z + Math.sin(angle) * dist,
      health: 40 + Math.random() * 30,
      maxHealth: 70,
      speed: 0.03 + Math.random() * 0.04,
      damage: 8 + Math.random() * 12,
      type: 'imp',
      name: '小妖',
      lastAttack: 0,
      size: 8,
      color: '#8b0000',
      animation: Math.random() * Math.PI * 2
    };
  } else if (type < 0.7) {
    // 妖怪
    demon = {
      x: player.x + Math.cos(angle) * dist,
      y: 0,
      z: player.z + Math.sin(angle) * dist,
      health: 80 + Math.random() * 60,
      maxHealth: 140,
      speed: 0.04 + Math.random() * 0.06,
      damage: 15 + Math.random() * 20,
      type: 'demon',
      name: '妖怪',
      lastAttack: 0,
      size: 12,
      color: '#4a0080',
      animation: Math.random() * Math.PI * 2,
      hasMagic: Math.random() > 0.5
    };
  } else if (type < 0.9) {
    // 大妖
    demon = {
      x: player.x + Math.cos(angle) * dist,
      y: 0,
      z: player.z + Math.sin(angle) * dist,
      health: 150 + Math.random() * 100,
      maxHealth: 250,
      speed: 0.05 + Math.random() * 0.07,
      damage: 25 + Math.random() * 30,
      type: 'great_demon',
      name: '大妖',
      lastAttack: 0,
      size: 16,
      color: '#ff4500',
      animation: Math.random() * Math.PI * 2,
      hasShield: Math.random() > 0.4,
      shieldGlow: 0
    };
  } else {
    // 妖王
    demon = {
      x: player.x + Math.cos(angle) * dist,
      y: 0,
      z: player.z + Math.sin(angle) * dist,
      health: 400 + Math.random() * 300,
      maxHealth: 700,
      speed: 0.04 + Math.random() * 0.05,
      damage: 40 + Math.random() * 50,
      type: 'demon_king',
      name: '妖王',
      lastAttack: 0,
      size: 24,
      color: '#8b0000',
      animation: Math.random() * Math.PI * 2,
      hasShield: true,
      hasMagic: true,
      aura: 0
    };
  }
  demons.push(demon);
}

function spawnItem() {
  const types = ['health', 'mana', 'exp', 'peach', 'wine', 'treasure'];
  const type = types[Math.floor(Math.random() * types.length)];
  items.push({
    x: (Math.random() - 0.5) * WORLD_SIZE * 0.8,
    y: 0,
    z: (Math.random() - 0.5) * WORLD_SIZE * 0.8,
    type: type,
    collected: false,
    glow: Math.random() * Math.PI * 2,
    float: Math.random() * Math.PI * 2
  });
}

function update(deltaTime) {
  if (!gameRunning) return;
  
  gameTime -= deltaTime / 1000;
  if (gameTime <= 0) {
    gameOver('取经时间耗尽...');
    return;
  }
  
  const moveSpeed = player.isSprinting ? player.sprintSpeed : player.speed;
  
  let dx = 0, dz = 0;
  if (keys['w'] || keys['W']) { dx += Math.sin(player.yaw); dz += Math.cos(player.yaw); }
  if (keys['s'] || keys['S']) { dx -= Math.sin(player.yaw); dz -= Math.cos(player.yaw); }
  if (keys['a'] || keys['A']) { dx -= Math.cos(player.yaw); dz += Math.sin(player.yaw); }
  if (keys['d'] || keys['D']) { dx += Math.cos(player.yaw); dz -= Math.sin(player.yaw); }
  
  const len = Math.sqrt(dx * dx + dz * dz);
  if (len > 0) {
    dx = dx / len * moveSpeed;
    dz = dz / len * moveSpeed;
  }
  
  player.x += dx;
  player.z += dz;
  player.x = Math.max(-WORLD_SIZE/2, Math.min(WORLD_SIZE/2, player.x));
  player.z = Math.max(-WORLD_SIZE/2, Math.min(WORLD_SIZE/2, player.z));
  
  if (player.isJumping) {
    player.vy -= player.gravity;
    player.y += player.vy;
    if (player.y <= 0) {
      player.y = 0;
      player.vy = 0;
      player.isJumping = false;
    }
  }
  
  if (player.isSprinting && (dx !== 0 || dz !== 0)) {
    player.mana = Math.max(0, player.mana - 0.3);
  } else {
    player.mana = Math.min(player.maxMana, player.mana + 0.15);
  }
  
  if (keys['Shift'] || keys['shift']) {
    player.isSprinting = player.mana > 15;
  } else {
    player.isSprinting = false;
  }
  
  if (keys[' '] && !player.isJumping) {
    player.isJumping = true;
    player.vy = player.jumpForce;
  }
  
  // 技能冷却
  player.skills.forEach(skill => {
    if (skill.cooldown > 0) {
      skill.cooldown -= deltaTime;
    }
  });
  
  // 变身计时
  if (player.transform) {
    player.transformTimer -= deltaTime;
    if (player.transformTimer <= 0) {
      player.transform = null;
      showMessage('变身结束');
    }
  }
  
  // 更新妖怪
  demons.forEach(demon => {
    const dx = player.x - demon.x;
    const dz = player.z - demon.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    
    demon.animation += 0.04;
    
    if (dist > 3) {
      demon.x += (dx / dist) * demon.speed;
      demon.z += (dz / dist) * demon.speed;
    } else {
      const now = Date.now();
      if (now - demon.lastAttack > 1200) {
        const damage = player.transform ? demon.damage * 0.5 : demon.damage;
        player.health -= damage;
        demon.lastAttack = now;
        showMessage(`受到${demon.name}攻击！-${damage.toFixed(0)}生命`);
        createParticles(player.x, player.y + 10, player.z, '#ef4444', 12);
      }
    }
    
    if (dist > 350) {
      const angle = Math.random() * Math.PI * 2;
      demon.x = player.x + Math.cos(angle) * 180;
      demon.z = player.z + Math.sin(angle) * 180;
    }
    
    if (demon.type === 'great_demon' || demon.type === 'demon_king') {
      demon.shieldGlow = (demon.shieldGlow || 0) + 0.05;
    }
    if (demon.type === 'demon_king') {
      demon.aura = (demon.aura || 0) + 0.03;
    }
  });
  
  // 攻击
  if (mouseDown && Date.now() - lastShot > 300) {
    attack();
    lastShot = Date.now();
  }
  
  // 物品收集
  items.forEach(item => {
    if (item.collected) return;
    const dx = player.x - item.x;
    const dz = player.z - item.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    
    item.glow += 0.04;
    item.float += 0.02;
    
    if (dist < 4 && keys['e']) {
      item.collected = true;
      collectItem(item);
    }
  });
  
  // 更新粒子
  particles.filter(p => p.life > 0).forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.z += p.vz;
    p.vy -= 0.008;
    p.life -= 0.015;
    p.size *= 0.99;
    p.rotation += p.rotSpeed;
  });
  
  // 更新云朵
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > WORLD_SIZE) c.x = -WORLD_SIZE;
  });
  
  // 更新树木发光
  trees.forEach(t => {
    t.glow += 0.02;
  });
  
  player.health = Math.max(0, Math.min(player.maxHealth, player.health - 0.005));
  
  if (player.health <= 0) {
    gameOver('被妖怪打败了...');
  }
  
  score += deltaTime / 1000;
  
  if (demons.length < 25) spawnDemon();
  if (items.filter(i => !i.collected).length < 20) spawnItem();
}

function attack() {
  const skill = player.skills[player.selectedSkill];
  
  if (skill.cooldown > 0) {
    showMessage('技能冷却中...');
    return;
  }
  
  if (player.mana < skill.manaCost) {
    showMessage('法力不足！');
    return;
  }
  
  player.mana -= skill.manaCost;
  skill.cooldown = skill.maxCooldown;
  
  if (skill.name === '金箍棒') {
    // 近战攻击
    createMaceEffect();
    demons.forEach((demon, i) => {
      const dx = demon.x - player.x;
      const dz = demon.z - player.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      
      if (dist < 15) {
        const damage = player.transform ? skill.damage * 2 : skill.damage;
        demon.health -= damage;
        createParticles(demon.x, demon.y + 10, demon.z, '#f59e0b', 15);
        
        if (demon.health <= 0) {
          createExplosion(demon.x, demon.y + 10, demon.z, '#f59e0b');
          demons.splice(i, 1);
          kills++;
          score += 100;
          player.exp += 20;
          checkLevelUp();
          showMessage('+100 击杀奖励');
          spawnItem();
        }
      }
    });
  } else if (skill.name === '三昧真火') {
    // 火焰攻击
    createFireEffect();
    demons.forEach((demon, i) => {
      const dx = demon.x - player.x;
      const dz = demon.z - player.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      const nx = dx / dist;
      const nz = dz / dist;
      const viewX = Math.sin(player.yaw);
      const viewZ = Math.cos(player.yaw);
      const dot = nx * viewX + nz * viewZ;
      
      if (dot > 0.8 && dist < 60) {
        const damage = player.transform ? skill.damage * 2 : skill.damage;
        demon.health -= damage;
        createParticles(demon.x, demon.y + 10, demon.z, '#ff4500', 20);
        
        if (demon.health <= 0) {
          createExplosion(demon.x, demon.y + 10, demon.z, '#ff4500');
          demons.splice(i, 1);
          kills++;
          score += 150;
          player.exp += 30;
          checkLevelUp();
          showMessage('+150 击杀奖励');
          spawnItem();
        }
      }
    });
  } else if (skill.name === '雷击') {
    // 雷电攻击
    createLightningEffect();
    demons.forEach((demon, i) => {
      const dx = demon.x - player.x;
      const dz = demon.z - player.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      
      if (dist < 80) {
        const damage = player.transform ? skill.damage * 2 : skill.damage;
        demon.health -= damage;
        createParticles(demon.x, demon.y + 10, demon.z, '#ffff00', 25);
        
        if (demon.health <= 0) {
          createExplosion(demon.x, demon.y + 10, demon.z, '#ffff00');
          demons.splice(i, 1);
          kills++;
          score += 200;
          player.exp += 40;
          checkLevelUp();
          showMessage('+200 击杀奖励');
          spawnItem();
        }
      }
    });
  } else if (skill.name === '定身术') {
    // 定身
    createFreezeEffect();
    demons.forEach(demon => {
      const dx = demon.x - player.x;
      const dz = demon.z - player.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      
      if (dist < 50) {
        demon.speed *= 0.1;
        demon.frozen = true;
        setTimeout(() => {
          demon.speed *= 10;
          demon.frozen = false;
        }, 3000);
      }
    });
  } else if (skill.name === '七十二变') {
    // 变身
    player.transform = 'golden_monkey';
    player.transformTimer = 10000;
    showMessage('七十二变！变身金猴王！');
    createTransformEffect();
  }
}

function createMaceEffect() {
  for (let i = 0; i < 15; i++) {
    particles.push({
      x: player.x + Math.sin(player.yaw) * 8,
      y: player.y + 10,
      z: player.z + Math.cos(player.yaw) * 8,
      vx: Math.sin(player.yaw) * 0.8 + (Math.random() - 0.5) * 0.5,
      vy: 0.3 + Math.random() * 0.4,
      vz: Math.cos(player.yaw) * 0.8 + (Math.random() - 0.5) * 0.5,
      color: '#f59e0b',
      life: 0.6,
      size: 4 + Math.random() * 3,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3
    });
  }
}

function createFireEffect() {
  for (let i = 0; i < 25; i++) {
    particles.push({
      x: player.x + Math.sin(player.yaw) * 10,
      y: player.y + 12,
      z: player.z + Math.cos(player.yaw) * 10,
      vx: Math.sin(player.yaw) * 1.2 + (Math.random() - 0.5) * 0.6,
      vy: 0.4 + Math.random() * 0.5,
      vz: Math.cos(player.yaw) * 1.2 + (Math.random() - 0.5) * 0.6,
      color: Math.random() > 0.5 ? '#ff4500' : '#ff8c00',
      life: 0.8,
      size: 5 + Math.random() * 4,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2
    });
  }
}

function createLightningEffect() {
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 80;
    particles.push({
      x: player.x + Math.cos(angle) * dist,
      y: player.y + 50 + Math.random() * 50,
      z: player.z + Math.sin(angle) * dist,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -0.5 - Math.random() * 0.5,
      vz: (Math.random() - 0.5) * 0.3,
      color: '#ffff00',
      life: 0.5,
      size: 3 + Math.random() * 4,
      rotation: 0,
      rotSpeed: 0
    });
  }
}

function createFreezeEffect() {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 50;
    particles.push({
      x: player.x + Math.cos(angle) * dist,
      y: player.y + 10,
      z: player.z + Math.sin(angle) * dist,
      vx: 0,
      vy: 0.1 + Math.random() * 0.2,
      vz: 0,
      color: '#00bfff',
      life: 1,
      size: 4 + Math.random() * 5,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.1
    });
  }
}

function createTransformEffect() {
  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 20;
    particles.push({
      x: player.x + Math.cos(angle) * dist,
      y: player.y + Math.random() * 30,
      z: player.z + Math.sin(angle) * dist,
      vx: Math.cos(angle) * 0.5,
      vy: 0.3 + Math.random() * 0.3,
      vz: Math.sin(angle) * 0.5,
      color: Math.random() > 0.5 ? '#f59e0b' : '#fff',
      life: 1,
      size: 5 + Math.random() * 5,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2
    });
  }
}

function createExplosion(x, y, z, color) {
  for (let i = 0; i < 30; i++) {
    particles.push({
      x: x,
      y: y,
      z: z,
      vx: (Math.random() - 0.5) * 1.5,
      vy: Math.random() * 0.8,
      vz: (Math.random() - 0.5) * 1.5,
      color: color,
      life: 1,
      size: 4 + Math.random() * 6,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2
    });
  }
}

function collectItem(item) {
  switch(item.type) {
    case 'health':
      player.health = Math.min(player.maxHealth, player.health + 30);
      showMessage('+30 生命');
      break;
    case 'mana':
      player.mana = Math.min(player.maxMana, player.mana + 40);
      showMessage('+40 法力');
      break;
    case 'exp':
      player.exp += 50;
      checkLevelUp();
      showMessage('+50 经验');
      break;
    case 'peach':
      player.health = Math.min(player.maxHealth, player.health + 50);
      player.mana = Math.min(player.maxMana, player.mana + 50);
      showMessage('蟠桃：+50 生命/法力');
      break;
    case 'wine':
      player.mana = Math.min(player.maxMana, player.mana + 80);
      showMessage('仙酒：+80 法力');
      break;
    case 'treasure':
      player.exp += 100;
      checkLevelUp();
      showMessage('宝箱：+100 经验');
      break;
  }
  score += 50;
  createParticles(item.x, item.y + 5, item.z, '#f59e0b', 15);
}

function checkLevelUp() {
  if (player.exp >= player.maxExp) {
    player.exp -= player.maxExp;
    player.maxExp = Math.floor(player.maxExp * 1.5);
    level++;
    player.maxHealth += 20;
    player.maxMana += 15;
    player.health = player.maxHealth;
    player.mana = player.maxMana;
    showMessage(`升级！等级 ${level}`);
    createTransformEffect();
  }
}

function createParticles(x, y, z, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, z,
      vx: (Math.random() - 0.5) * 0.6,
      vy: Math.random() * 0.4,
      vz: (Math.random() - 0.5) * 0.6,
      color: color,
      life: 1,
      size: 3 + Math.random() * 4,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.15
    });
  }
}

function showMessage(text) {
  const msg = document.getElementById('message');
  msg.textContent = text;
  msg.style.opacity = 1;
  setTimeout(() => msg.style.opacity = 0, 1500);
}

function render() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  
  // 天空
  const skyGradient = ctx.createLinearGradient(0, 0, 0, H * 0.6);
  skyGradient.addColorStop(0, '#1a0a2e');
  skyGradient.addColorStop(0.3, '#2d1b4e');
  skyGradient.addColorStop(0.6, '#4a1942');
  skyGradient.addColorStop(1, '#6b2150');
  ctx.fillStyle = skyGradient;
  ctx.fillRect(0, 0, W, H);
  
  // 星空
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 200; i++) {
    const sx = (Math.sin(i * 132.1) * 0.5 + 0.5) * W;
    const sy = (Math.cos(i * 73.7) * 0.5 + 0.5) * H * 0.4;
    const size = Math.sin(Date.now() / 1000 + i) * 0.5 + 1;
    ctx.globalAlpha = 0.4 + Math.sin(Date.now() / 2000 + i) * 0.3;
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // 月亮
  const moonX = W * 0.8;
  const moonY = H * 0.1;
  ctx.fillStyle = '#f0f0e0';
  ctx.shadowColor = '#f0f0e0';
  ctx.shadowBlur = 40;
  ctx.beginPath();
  ctx.arc(moonX, moonY, 45, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // 地面
  const groundGradient = ctx.createLinearGradient(0, H * 0.6, 0, H);
  groundGradient.addColorStop(0, '#2a2a1a');
  groundGradient.addColorStop(0.5, '#1a1a0a');
  groundGradient.addColorStop(1, '#0a0a0a');
  ctx.fillStyle = groundGradient;
  ctx.fillRect(0, H * 0.6, W, H * 0.4);
  
  // 远山
  mountains.forEach(m => {
    const relX = m.x - player.x;
    const relZ = m.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    
    if (rotZ > 0) {
      const scale = 200 / rotZ;
      const screenX = W / 2 + rotX * scale;
      const screenY = H * 0.6;
      
      ctx.fillStyle = m.color;
      ctx.beginPath();
      ctx.moveTo(screenX - m.w * scale / 2, screenY);
      ctx.lineTo(screenX, screenY - m.h * scale);
      ctx.lineTo(screenX + m.w * scale / 2, screenY);
      ctx.closePath();
      ctx.fill();
    }
  });
  
  // 云朵
  clouds.forEach(c => {
    const relX = c.x - player.x;
    const relZ = c.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    
    if (rotZ > 0 && rotZ < 300) {
      const scale = 200 / rotZ;
      const screenX = W / 2 + rotX * scale;
      const screenY = H * 0.6 - c.y * scale;
      
      ctx.globalAlpha = c.opacity;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(screenX, screenY, c.size * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(screenX - c.size * scale * 0.5, screenY + c.size * scale * 0.2, c.size * scale * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(screenX + c.size * scale * 0.4, screenY + c.size * scale * 0.15, c.size * scale * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  });
  
  // 收集3D对象
  const objects3D = [];
  
  // 建筑
  buildings.forEach(b => {
    const relX = b.x - player.x;
    const relZ = b.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    
    if (rotZ > 0.1 && rotZ < 300) {
      const scale = 200 / rotZ;
      const screenX = W / 2 + rotX * scale;
      const screenY = H * 0.6 - b.h * scale / 2;
      
      objects3D.push({
        type: 'building',
        x: screenX,
        y: screenY,
        w: b.w * scale,
        h: b.h * scale,
        d: rotZ,
        color: b.color,
        buildingType: b.type,
        hasRoof: b.hasRoof,
        roofColor: b.roofColor,
        pillars: b.pillars,
        hasTree: b.hasTree,
        treeCount: b.treeCount,
        hasFire: b.hasFire,
        fireIntensity: b.fireIntensity
      });
    }
  });
  
  // 树木
  trees.forEach(t => {
    const relX = t.x - player.x;
    const relZ = t.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    
    if (rotZ > 0.1 && rotZ < 200) {
      const scale = 200 / rotZ;
      const screenX = W / 2 + rotX * scale;
      const screenY = H * 0.6;
      
      objects3D.push({
        type: 'tree',
        x: screenX,
        y: screenY,
        h: t.h * scale,
        r: t.r * scale,
        d: rotZ,
        treeType: t.type,
        color: t.color,
        hasFruit: t.hasFruit,
        glow: t.glow
      });
    }
  });
  
  // 妖怪
  demons.forEach(e => {
    const relX = e.x - player.x;
    const relZ = e.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    
    if (rotZ > 0.1 && rotZ < 250) {
      const scale = 200 / rotZ;
      const screenX = W / 2 + rotX * scale;
      const screenY = H * 0.6 - 10 * scale;
      
      objects3D.push({
        type: 'demon',
        x: screenX,
        y: screenY,
        size: e.size * scale,
        d: rotZ,
        health: e.health,
        maxHealth: e.maxHealth,
        demonType: e.type,
        name: e.name,
        color: e.color,
        animation: e.animation,
        hasShield: e.hasShield,
        hasMagic: e.hasMagic,
        shieldGlow: e.shieldGlow,
        aura: e.aura,
        frozen: e.frozen
      });
    }
  });
  
  // 物品
  items.forEach(item => {
    if (item.collected) return;
    const relX = item.x - player.x;
    const relZ = item.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    
    if (rotZ > 0.1 && rotZ < 200) {
      const scale = 200 / rotZ;
      const screenX = W / 2 + rotX * scale;
      const screenY = H * 0.6 - 3 * scale + Math.sin(item.float) * 6;
      
      objects3D.push({
        type: 'item',
        x: screenX,
        y: screenY,
        size: 3 * scale,
        d: rotZ,
        itemType: item.type,
        glow: item.glow
      });
    }
  });
  
  // 粒子
  particles.forEach(p => {
    const relX = p.x - player.x;
    const relZ = p.z - player.z;
    const rotX = relX * Math.cos(player.yaw) - relZ * Math.sin(player.yaw);
    const rotZ = relX * Math.sin(player.yaw) + relZ * Math.cos(player.yaw);
    
    if (rotZ > 0.1) {
      const scale = 200 / rotZ;
      const screenX = W / 2 + rotX * scale;
      const screenY = H * 0.6 - p.y * scale;
      
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.save();
      ctx.translate(screenX, screenY);
      ctx.rotate(p.rotation);
      ctx.beginPath();
      ctx.arc(0, 0, p.size * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  });
  
  // 按距离排序
  objects3D.sort((a, b) => b.d - a.d);
  
  objects3D.forEach(obj => {
    if (obj.type === 'building') {
      // 建筑阴影
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(obj.x - obj.w/2 + 5, obj.y + obj.h, obj.w, 8);
      
      // 建筑主体
      const gradient = ctx.createLinearGradient(obj.x - obj.w/2, obj.y, obj.x + obj.w/2, obj.y);
      gradient.addColorStop(0, obj.color);
      gradient.addColorStop(0.5, lightenColor(obj.color, 10));
      gradient.addColorStop(1, obj.color);
      ctx.fillStyle = gradient;
      ctx.fillRect(obj.x - obj.w/2, obj.y, obj.w, obj.h);
      
      // 屋顶
      if (obj.hasRoof) {
        ctx.fillStyle = obj.roofColor || '#dc2626';
        ctx.beginPath();
        ctx.moveTo(obj.x - obj.w/2 - 8, obj.y);
        ctx.lineTo(obj.x, obj.y - obj.h * 0.3);
        ctx.lineTo(obj.x + obj.w/2 + 8, obj.y);
        ctx.closePath();
        ctx.fill();
      }
      
      // 柱子
      if (obj.pillars) {
        ctx.fillStyle = '#8b4513';
        for (let i = 0; i < obj.pillars; i++) {
          const px = obj.x - obj.w/2 + (i + 1) * obj.w / (obj.pillars + 1);
          ctx.fillRect(px - 3, obj.y, 6, obj.h);
        }
      }
      
      // 丹炉火焰
      if (obj.hasFire) {
        ctx.fillStyle = `rgba(255,100,0,${obj.fireIntensity})`;
        ctx.beginPath();
        ctx.arc(obj.x, obj.y - 5, obj.w * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 2;
      ctx.strokeRect(obj.x - obj.w/2, obj.y, obj.w, obj.h);
      
    } else if (obj.type === 'tree') {
      // 树干
      ctx.fillStyle = '#5a3d2b';
      ctx.fillRect(obj.x - 4, obj.y - obj.h * 0.4, 8, obj.h * 0.4);
      
      // 树叶
      const glowIntensity = Math.sin(obj.glow) * 0.2 + 0.8;
      ctx.fillStyle = obj.color;
      ctx.beginPath();
      ctx.arc(obj.x, obj.y - obj.h * 0.6, obj.r * glowIntensity, 0, Math.PI * 2);
      ctx.fill();
      
      // 蟠桃
      if (obj.hasFruit && obj.treeType === 'peach') {
        ctx.fillStyle = '#ff69b4';
        ctx.shadowColor = '#ff69b4';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(obj.x + obj.r * 0.5, obj.y - obj.h * 0.5, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      
    } else if (obj.type === 'demon') {
      const bodyWidth = obj.size * 0.8;
      const bodyHeight = obj.size * 1.2;
      
      // 妖王光环
      if (obj.demonType === 'demon_king') {
        ctx.globalAlpha = 0.3;
        const auraGradient = ctx.createRadialGradient(obj.x, obj.y - bodyHeight/2, 0, obj.x, obj.y - bodyHeight/2, obj.size * 1.5);
        auraGradient.addColorStop(0, 'rgba(139,0,0,0.4)');
        auraGradient.addColorStop(1, 'rgba(139,0,0,0)');
        ctx.fillStyle = auraGradient;
        ctx.beginPath();
        ctx.arc(obj.x, obj.y - bodyHeight/2, obj.size * 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      
      // 定身效果
      if (obj.frozen) {
        ctx.strokeStyle = '#00bfff';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.arc(obj.x, obj.y - bodyHeight/2, obj.size * 0.9, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      
      // 身体
      const wobble = Math.sin(obj.animation) * 3;
      ctx.fillStyle = obj.color;
      ctx.fillRect(obj.x - bodyWidth/2 + wobble, obj.y - bodyHeight, bodyWidth, bodyHeight);
      
      // 头部
      ctx.beginPath();
      ctx.arc(obj.x + wobble, obj.y - bodyHeight - obj.size * 0.3, obj.size * 0.35, 0, Math.PI * 2);
      ctx.fill();
      
      // 眼睛
      ctx.fillStyle = '#ff0000';
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(obj.x - obj.size * 0.12 + wobble, obj.y - bodyHeight - obj.size * 0.35, obj.size * 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(obj.x + obj.size * 0.12 + wobble, obj.y - bodyHeight - obj.size * 0.35, obj.size * 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      // 护盾
      if (obj.hasShield) {
        ctx.strokeStyle = `rgba(139,0,0,${Math.sin(obj.shieldGlow) * 0.3 + 0.5})`;
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 4]);
        ctx.beginPath();
        ctx.arc(obj.x + wobble, obj.y - bodyHeight/2, obj.size * 0.9, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      
      // 血条
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(obj.x - obj.size/2, obj.y - obj.size - 14, obj.size, 8);
      const healthPercent = obj.health / obj.maxHealth;
      ctx.fillStyle = healthPercent > 0.5 ? '#22c55e' : healthPercent > 0.25 ? '#f59e0b' : '#ef4444';
      ctx.fillRect(obj.x - obj.size/2, obj.y - obj.size - 14, healthPercent * obj.size, 8);
      
      // 名字
      ctx.fillStyle = '#fff';
      ctx.font = `${Math.max(10, obj.size * 0.3)}px STKaiti, KaiTi, serif`;
      ctx.textAlign = 'center';
      ctx.fillText(obj.name, obj.x + wobble, obj.y - obj.size - 18);
      
    } else if (obj.type === 'item') {
      const pulse = Math.sin(obj.glow) * 0.2 + 1;
      
      // 光圈
      ctx.globalAlpha = 0.4;
      const glowGradient = ctx.createRadialGradient(obj.x, obj.y, 0, obj.x, obj.y, obj.size * 2 * pulse);
      glowGradient.addColorStop(0, `${getItemColor(obj.itemType)}60`);
      glowGradient.addColorStop(1, `${getItemColor(obj.itemType)}00`);
      ctx.fillStyle = glowGradient;
      ctx.beginPath();
      ctx.arc(obj.x, obj.y, obj.size * 2 * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      
      // 物品
      ctx.fillStyle = getItemColor(obj.itemType);
      ctx.shadowColor = getItemColor(obj.itemType);
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(obj.x, obj.y, obj.size * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      // 图标
      ctx.fillStyle = '#fff';
      ctx.font = `${obj.size * 1.5}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(getItemIcon(obj.itemType), obj.x, obj.y);
    }
  });
  
  // 变身效果
  if (player.transform) {
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = '#f59e0b';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  
  // 暗角
  const vignette = ctx.createRadialGradient(W/2, H/2, W * 0.4, W/2, H/2, W * 0.8);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(0.7, 'rgba(0,0,0,0.1)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
  
  renderMinimap();
  updateUI();
}

function lightenColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.min(255, (num >> 16) + amt);
  const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
  const B = Math.min(255, (num & 0x0000FF) + amt);
  return `#${(1 << 24 | R << 16 | G << 8 | B).toString(16).slice(1)}`;
}

function getItemColor(type) {
  const colors = {
    health: '#ef4444',
    mana: '#3b82f6',
    exp: '#f59e0b',
    peach: '#ff69b4',
    wine: '#8b5cf6',
    treasure: '#22c55e'
  };
  return colors[type] || '#fff';
}

function getItemIcon(type) {
  const icons = {
    health: '❤️',
    mana: '💧',
    exp: '⭐',
    peach: '🍑',
    wine: '🍶',
    treasure: '🎁'
  };
  return icons[type] || '❓';
}

function renderMinimap() {
  minimapCtx.fillStyle = 'rgba(0,0,0,0.85)';
  minimapCtx.fillRect(0, 0, 180, 180);
  
  const scale = 180 / 200;
  const centerX = 90;
  const centerY = 90;
  
  buildings.forEach(b => {
    const rx = (b.x - player.x) * scale + centerX;
    const rz = (b.z - player.z) * scale + centerY;
    if (rx > 0 && rx < 180 && rz > 0 && rz < 180) {
      minimapCtx.fillStyle = '#f59e0b';
      minimapCtx.fillRect(rx - 3, rz - 3, 6, 6);
    }
  });
  
  demons.forEach(e => {
    const rx = (e.x - player.x) * scale + centerX;
    const rz = (e.z - player.z) * scale + centerY;
    if (rx > 0 && rx < 180 && rz > 0 && rz < 180) {
      minimapCtx.fillStyle = e.type === 'demon_king' ? '#ff4500' : e.type === 'great_demon' ? '#dc2626' : '#ef4444';
      minimapCtx.beginPath();
      minimapCtx.arc(rx, rz, e.type === 'demon_king' ? 5 : 3, 0, Math.PI * 2);
      minimapCtx.fill();
    }
  });
  
  items.forEach(item => {
    if (item.collected) return;
    const rx = (item.x - player.x) * scale + centerX;
    const rz = (item.z - player.z) * scale + centerY;
    if (rx > 0 && rx < 180 && rz > 0 && rz < 180) {
      minimapCtx.fillStyle = '#22c55e';
      minimapCtx.beginPath();
      minimapCtx.arc(rx, rz, 2, 0, Math.PI * 2);
      minimapCtx.fill();
    }
  });
  
  minimapCtx.fillStyle = '#f59e0b';
  minimapCtx.beginPath();
  minimapCtx.arc(centerX, centerY, 5, 0, Math.PI * 2);
  minimapCtx.fill();
  
  const dirX = Math.sin(player.yaw) * 15;
  const dirZ = Math.cos(player.yaw) * 15;
  minimapCtx.strokeStyle = '#f59e0b';
  minimapCtx.lineWidth = 2;
  minimapCtx.beginPath();
  minimapCtx.moveTo(centerX, centerY);
  minimapCtx.lineTo(centerX + dirX, centerY + dirZ);
  minimapCtx.stroke();
}

function updateUI() {
  document.getElementById('healthBar').style.width = (player.health / player.maxHealth * 100) + '%';
  document.getElementById('healthText').textContent = Math.round(player.health);
  document.getElementById('manaBar').style.width = (player.mana / player.maxMana * 100) + '%';
  document.getElementById('manaText').textContent = Math.round(player.mana);
  document.getElementById('expBar').style.width = (player.exp / player.maxExp * 100) + '%';
  document.getElementById('expText').textContent = `${player.exp}/${player.maxExp}`;
  
  document.querySelectorAll('.skill-slot').forEach((slot, i) => {
    const skill = player.skills[i];
    slot.className = 'skill-slot' + (i === player.selectedSkill ? ' active' : '');
    const cdEl = slot.querySelector('.skill-cd');
    if (skill.cooldown > 0) {
      if (!cdEl) {
        const cd = document.createElement('span');
        cd.className = 'skill-cd';
        cd.textContent = Math.ceil(skill.cooldown / 1000) + 's';
        slot.appendChild(cd);
      } else {
        cdEl.textContent = Math.ceil(skill.cooldown / 1000) + 's';
      }
    } else if (cdEl) {
      cdEl.remove();
    }
  });
  
  document.querySelectorAll('.inv-slot').forEach((slot, i) => {
    slot.className = 'inv-slot' + (i === 0 ? ' active' : '');
  });
}

function gameOver(reason) {
  gameRunning = false;
  document.getElementById('gameOver').style.display = 'flex';
  document.getElementById('deathStats').innerHTML = `
    失败原因：${reason}<br>
    等级：${level}<br>
    击杀妖怪：${kills}<br>
    最终评分：${Math.round(score * 10 + kills * 100 + level * 500)}
  `;
  document.body.style.cursor = 'default';
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  gameRunning = true;
  gameTime = 7200;
  score = 0;
  kills = 0;
  level = 1;
  player.x = 0;
  player.y = 0;
  player.z = 0;
  player.health = 100;
  player.mana = 100;
  player.exp = 0;
  player.transform = null;
  document.body.style.cursor = 'none';
  initWorld();
  gameLoop();
}

function restartGame() {
  document.getElementById('gameOver').style.display = 'none';
  startGame();
}

let lastTime = 0;
function gameLoop(timestamp = 0) {
  if (!gameRunning) return;
  const deltaTime = timestamp - lastTime;
  lastTime = timestamp;
  update(deltaTime);
  render();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  const num = parseInt(e.key);
  if (num >= 1 && num <= 5) {
    player.selectedSkill = num - 1;
  }
});

document.addEventListener('keyup', e => {
  keys[e.key] = false;
});

document.addEventListener('mousemove', e => {
  if (!gameRunning) return;
  player.yaw += e.movementX * 0.002;
  player.pitch -= e.movementY * 0.002;
  player.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, player.pitch));
});

document.addEventListener('mousedown', e => {
  if (e.button === 0) mouseDown = true;
});

document.addEventListener('mouseup', e => {
  if (e.button === 0) mouseDown = false;
});

canvas.addEventListener('click', () => {
  if (gameRunning) canvas.requestPointerLock();
});

window.addEventListener('resize', () => {
  const PIXEL_RATIO = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * PIXEL_RATIO;
  canvas.height = window.innerHeight * PIXEL_RATIO;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(PIXEL_RATIO, PIXEL_RATIO);
});
</script>
